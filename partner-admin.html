<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 센텀하이</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --gold: #b8892a;
      --gold-light: #d4a843;
      --gold-dim: #b8892a15;
      --bg: #f4f3f0;
      --surface: #ffffff;
      --border: #e8e5de;
      --text: #1a1a18;
      --muted: #888880;
      --red: #dc2626;
      --green: #16a34a;
      --sidebar-w: 240px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Login Screen */
    .login-screen {
      position: fixed; inset: 0;
      background: #f4f3f0;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .login-wrap { width: 100%; max-width: 380px; padding: 20px; }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #d4a843, #b8892a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 4px;
    }
    .login-sub { text-align: center; font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 40px #00000010;
    }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .login-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      outline: none; transition: all 0.2s; margin-bottom: 12px;
    }
    .login-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    .login-btn {
      width: 100%; padding: 13px;
      background: #1a1a14; color: #fff;
      border: none; border-radius: 9px;
      font-size: 14px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .login-btn:hover { background: #2a2a20; }
    .login-msg { padding: 10px 14px; border-radius: 8px; margin-top: 10px; font-size: 13px; display: none; }
    .login-msg.error { background: #fff0f0; color: var(--red); border: 1px solid #fecaca; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: #1a1a14;
      position: fixed; left: 0; top: 0; bottom: 0;
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo { padding: 28px 24px 20px; border-bottom: 1px solid #2a2a20; }
    .sidebar-logo .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px; letter-spacing: 3px;
      background: linear-gradient(135deg, #d4a843, #b8892a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sidebar-logo .sub { font-size: 9px; color: #333; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; }
    .nav-label { font-size: 9px; color: #2a2a20; letter-spacing: 2px; text-transform: uppercase; padding: 0 12px; margin: 14px 0 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 13px; color: #555; cursor: pointer;
      transition: all 0.15s; text-decoration: none; margin-bottom: 2px;
    }
    .nav-item:hover { background: #252520; color: #e8e8e0; }
    .nav-item.active { background: var(--gold-dim); color: #d4a843; }
    .sidebar-footer { padding: 16px 24px; border-top: 1px solid #2a2a20; }
    .logout-lnk { font-size: 12px; color: #333; cursor: pointer; background: none; border: none; font-family: 'Noto Sans KR', sans-serif; transition: color 0.2s; }
    .logout-lnk:hover { color: #666; }

    /* Main */
    .main { margin-left: var(--sidebar-w); flex: 1; display: none; }
    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 36px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .reset-btn {
      padding: 7px 16px;
      background: #fff0f0; color: var(--red);
      border: 1px solid #fecaca; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .reset-btn:hover { background: #fee2e2; }
    .content { padding: 28px 36px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card .top-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card .top-bar.gold { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
    .stat-card .top-bar.green { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .stat-card .top-bar.yellow { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .stat-card .top-bar.blue { background: linear-gradient(90deg, #2563eb, #60a5fa); }
    .s-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .s-value { font-size: 28px; font-weight: 800; color: var(--text); }
    .s-value.gold { color: var(--gold); }
    .s-value.green { color: var(--green); }
    .s-value.yellow { color: #d97706; }

    /* Section */
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-title { font-size: 14px; font-weight: 700; }

    /* Sale form */
    .sale-form { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
    .sf-group label { font-size: 11px; color: var(--muted); margin-bottom: 5px; display: block; }
    .sf-input {
      padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none; width: 100%; transition: border-color 0.2s;
    }
    .sf-input:focus { border-color: var(--gold); }
    .btn {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: #1a1a14; color: #fff; }
    .btn-primary:hover { background: #2a2a20; }
    .btn-confirm { background: #f0fff0; color: var(--green); border: 1px solid #bbf7d0; }
    .btn-confirm:hover { background: #dcfce7; }
    .btn-paid { background: #f0f0ff; color: #6366f1; border: 1px solid #c7d2fe; }
    .btn-paid:hover { background: #e0e7ff; }
    .btn-danger { background: #fff0f0; color: var(--red); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-gold { background: var(--gold-dim); color: var(--gold); border: 1px solid #e8c96d50; }
    .btn-gold:hover { background: #e8c96d25; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn {
      padding: 6px 16px; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.15s;
    }
    .tab-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
    .tab-btn.active.yellow { background: #d97706; border-color: #d97706; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    td { padding: 11px 12px; border-bottom: 1px solid #f0ede6; color: var(--text); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge.pending { background: #fef9ec; color: #92680a; border: 1px solid #f0d080; }
    .badge.confirmed { background: #f0faf0; color: #16a34a; border: 1px solid #bbf0bb; }
    .badge.processed { background: #f0f0ff; color: #6366f1; border: 1px solid #c0c0f0; }
    .empty { text-align: center; color: var(--muted); padding: 32px; font-size: 13px; }
    .role-dist { color: #d97706; font-weight: 700; font-size: 12px; }
    .role-partner { color: var(--green); font-size: 12px; }

    /* Notice form */
    .notice-form { display: grid; gap: 10px; margin-bottom: 20px; }
    .nf-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .nf-input, .nf-select, .nf-textarea {
      padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none; width: 100%; transition: border-color 0.2s;
    }
    .nf-textarea { min-height: 72px; resize: vertical; }
    .nf-input:focus, .nf-select:focus, .nf-textarea:focus { border-color: var(--gold); }
    .notice-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .notice-item:last-child { border-bottom: none; }
    .notice-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .notice-tag.notice { background: #eff0ff; color: #6366f1; }
    .notice-tag.important { background: #fff0f0; color: var(--red); }
    .notice-tag.update { background: #f0fff0; color: var(--green); }
    .notice-title-text { font-size: 13px; font-weight: 600; color: var(--text); }
    .notice-content-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .notice-date-text { font-size: 11px; color: #ccc; margin-top: 3px; }

    /* Chart */
    .chart-wrap { position: relative; height: 200px; }

    /* Msg */
    .msg { padding: 10px 14px; border-radius: 8px; margin-top: 10px; font-size: 13px; display: none; }
    .msg.error { background: #fff0f0; color: var(--red); border: 1px solid #fecaca; }
    .msg.success { background: #f0fff0; color: var(--green); border: 1px solid #bbf0bb; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .sale-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="loginScreen">
    <div class="login-wrap">
      <div class="login-logo">CENTUMHI</div>
      <div class="login-sub">관리자 시스템</div>
      <div class="login-card">
        <h2>관리자 로그인</h2>
        <p>센텀하이 파트너 시스템 관리자 전용</p>
        <input class="login-input" type="password" id="adminPw" placeholder="관리자 비밀번호"
          onkeydown="if(event.key==='Enter') adminLogin()" />
        <button class="login-btn" onclick="adminLogin()">로그인</button>
        <div class="login-msg" id="loginMsg"></div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="sidebar" id="sidebarEl" style="display:none">
    <div class="sidebar-logo">
      <div class="name">CENTUMHI</div>
      <div class="sub">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">관리</div>
      <a class="nav-item active" href="#"><span>📊</span> 대시보드</a>
      <a class="nav-item" href="#sales-section"><span>💼</span> 판매 관리</a>
      <a class="nav-item" href="#withdraw-section"><span>💸</span> 출금 관리</a>
      <a class="nav-item" href="#partner-section"><span>👥</span> 파트너 목록</a>
      <a class="nav-item" href="#notice-section"><span>📢</span> 공지사항</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-lnk" onclick="adminLogout()">↩ 로그아웃</button>
    </div>
  </div>

  <div class="main" id="adminPanel">
    <div class="topbar">
      <div class="topbar-title">센텀하이 관리자</div>
      <button class="reset-btn" onclick="resetAllData()">⚠️ 전체 초기화</button>
    </div>

    <div class="content">

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card"><div class="top-bar gold"></div><div class="s-label">총 파트너</div><div class="s-value gold" id="totalPartners">-</div></div>
        <div class="stat-card"><div class="top-bar yellow"></div><div class="s-label">총판</div><div class="s-value yellow" id="totalDistributors">-</div></div>
        <div class="stat-card"><div class="top-bar green"></div><div class="s-label">확정 판매</div><div class="s-value green" id="confirmedSales">-</div></div>
        <div class="stat-card"><div class="top-bar blue"></div><div class="s-label">대기중 출금</div><div class="s-value" id="pendingWithdrawals">-</div></div>
      </div>

      <!-- Chart -->
      <div class="section">
        <div class="section-title" style="margin-bottom:16px">📈 월별 판매 현황</div>
        <div class="chart-wrap"><canvas id="salesChart"></canvas></div>
      </div>

      <!-- Sale register -->
      <div class="section" id="sales-section">
        <div class="section-header">
          <div class="section-title">➕ 판매 등록</div>
          <div style="font-size:12px;color:var(--muted)">입금 확인 후 여기서 등록</div>
        </div>
        <div class="sale-form">
          <div class="sf-group"><label>파트너 추천코드</label><input class="sf-input" type="text" id="saleRef" placeholder="ex: CH1234" /></div>
          <div class="sf-group"><label>고객명</label><input class="sf-input" type="text" id="saleCustomer" placeholder="홍길동" /></div>
          <div class="sf-group"><label>메모 (선택)</label><input class="sf-input" type="text" id="saleMemo" placeholder="추가 메모" /></div>
          <div class="sf-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="addSale()" style="width:100%">등록</button></div>
        </div>
        <div class="msg" id="saleMsg"></div>
      </div>

      <!-- Sales list -->
      <div class="section">
        <div class="section-title" style="margin-bottom:16px">📋 판매 내역 전체</div>
        <div id="salesList"><div class="empty">불러오는 중...</div></div>
      </div>

      <!-- Withdrawals -->
      <div class="section" id="withdraw-section">
        <div class="section-title" style="margin-bottom:12px">💸 출금 신청 목록</div>
        <div class="tab-bar">
          <button class="tab-btn active yellow" id="tabPending" onclick="switchWithdrawalTab('pending')">대기중 <span id="pendingCount"></span></button>
          <button class="tab-btn" id="tabDone" onclick="switchWithdrawalTab('done')">완료 <span id="doneCount"></span></button>
        </div>
        <div id="withdrawalList"><div class="empty">불러오는 중...</div></div>
      </div>

      <!-- Partners -->
      <div class="section" id="partner-section">
        <div class="section-title" style="margin-bottom:16px">👥 파트너 목록</div>
        <div id="partnerList"><div class="empty">불러오는 중...</div></div>
      </div>

      <!-- Notices -->
      <div class="section" id="notice-section">
        <div class="section-title" style="margin-bottom:16px">📢 공지사항 관리</div>
        <div class="notice-form">
          <div class="nf-row">
            <input class="nf-input" type="text" id="noticeTitle" placeholder="공지 제목" />
            <select class="nf-select" id="noticeType" style="width:110px">
              <option value="notice">공지</option>
              <option value="important">중요</option>
              <option value="update">업데이트</option>
            </select>
          </div>
          <textarea class="nf-textarea" id="noticeContent" placeholder="공지 내용을 입력하세요"></textarea>
          <div><button class="btn btn-primary" style="min-width:120px" onclick="addNotice()">공지 등록</button></div>
        </div>
        <div id="noticeAdminList"><div class="empty">공지사항 없음</div></div>
      </div>

    </div>
  </div>

  <script>
// ⚠️ 아래 두 값을 교체하세요
    const SUPABASE_URL = 'https://rxlzgppwvwyduilocrmo.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_HSt_wuJZd5D415dbpDjDJw_KN_cgap_' // ← Secret key로 교체 (관리자 전용 페이지)
    const ADMIN_PASSWORD = 'love0821aa@'

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function adminLogin() {
      const pw = document.getElementById('adminPw').value
      const msg = document.getElementById('loginMsg')
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_auth', '1')
        document.getElementById('loginScreen').style.display = 'none'
        document.getElementById('sidebarEl').style.display = 'flex'
        document.getElementById('adminPanel').style.display = 'block'
        loadAll()
      } else {
        msg.textContent = '비밀번호가 올바르지 않습니다.'
        msg.className = 'msg error'; msg.style.display = 'block'
      }
    }

    function adminLogout() {
      sessionStorage.removeItem('admin_auth')
      document.getElementById('loginScreen').style.display = 'flex'
      document.getElementById('sidebarEl').style.display = 'none'
      document.getElementById('adminPanel').style.display = 'none'
    }

    async function loadAll() {
      await Promise.all([loadStats(), loadSales(), loadWithdrawals(), loadPartners(), loadSalesChart(), loadNoticesAdmin()])
    }

    async function loadStats() {
      const [{ count: tp }, { count: td }, { count: cs }, { count: pw }] = await Promise.all([
        sb.from('partners').select('*', { count: 'exact', head: true }),
        sb.from('partners').select('*', { count: 'exact', head: true }).eq('role', 'distributor'),
        sb.from('sales').select('*', { count: 'exact', head: true }).eq('status', 'confirmed'),
        sb.from('withdrawals').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
      ])
      document.getElementById('totalPartners').textContent = tp || 0
      document.getElementById('totalDistributors').textContent = td || 0
      document.getElementById('confirmedSales').textContent = cs || 0
      document.getElementById('pendingWithdrawals').textContent = pw || 0
    }

    async function loadSales() {
      const { data } = await sb.from('sales').select('*').order('created_at', { ascending: false })
      if (!data || data.length === 0) {
        document.getElementById('salesList').innerHTML = '<div class="empty">판매 내역 없음</div>'; return
      }
      let html = '<table><thead><tr><th>날짜</th><th>파트너코드</th><th>고객명</th><th>수수료</th><th>상태</th><th>액션</th></tr></thead><tbody>'
      for (const s of data) {
        const date = new Date(s.created_at).toLocaleDateString('ko-KR')
        const statusMap = { pending: '대기중', confirmed: '확정', paid: '지급완료' }
        html += `<tr>
          <td>${date}</td>
          <td><code style="color:#22c55e">${s.ref_code}</code></td>
          <td>${s.customer_name || '-'}</td>
          <td style="color:${s.commission >= 300000 ? '#fbbf24' : '#22c55e'}">${s.commission.toLocaleString()}원${s.parent_ref_code ? ` <span style="font-size:10px;color:#888">(총판:${(s.parent_commission||0).toLocaleString()})</span>` : ''}</td>
          <td><span class="badge ${s.status === 'confirmed' ? 'confirmed' : s.status === 'paid' ? 'processed' : 'pending'}">${statusMap[s.status] || s.status}</span></td>
          <td>
            ${s.status === 'pending' ? `<button class="btn btn-confirm btn-sm" onclick="confirmSale('${s.id}','${s.ref_code}',${s.commission})">확정</button>` : '<span style="color:#333;font-size:12px">-</span>'}
          </td>
        </tr>`
      }
      html += '</tbody></table>'
      document.getElementById('salesList').innerHTML = html
    }

    let currentWithdrawalTab = 'pending'
    let allWithdrawals = []

    function switchWithdrawalTab(tab) {
      currentWithdrawalTab = tab
      document.getElementById('tabPending').className = 'tab-btn' + (tab === 'pending' ? ' active yellow' : '')
      document.getElementById('tabDone').className = 'tab-btn' + (tab === 'done' ? ' active' : '')
      renderWithdrawals()
    }

    function renderWithdrawals() {
      const filtered = allWithdrawals.filter(w =>
        currentWithdrawalTab === 'pending' ? w.status === 'pending' : w.status === 'processed'
      )
      const pendingCount = allWithdrawals.filter(w => w.status === 'pending').length
      const doneCount = allWithdrawals.filter(w => w.status === 'processed').length
      document.getElementById('pendingCount').textContent = pendingCount > 0 ? `(${pendingCount})` : ''
      document.getElementById('doneCount').textContent = doneCount > 0 ? `(${doneCount})` : ''

      if (filtered.length === 0) {
        document.getElementById('withdrawalList').innerHTML =
          `<div class="empty">${currentWithdrawalTab === 'pending' ? '대기중인 출금 신청이 없습니다' : '완료된 출금 내역이 없습니다'}</div>`
        return
      }
      let html = '<table><thead><tr><th>날짜</th><th>파트너코드</th><th>금액</th><th>계좌</th><th>상태</th><th>액션</th></tr></thead><tbody>'
      for (const w of filtered) {
        const date = new Date(w.created_at).toLocaleDateString('ko-KR')
        html += `<tr>
          <td>${date}</td>
          <td><code style="color:#22c55e">${w.ref_code}</code></td>
          <td>${w.amount.toLocaleString()}원</td>
          <td style="font-size:12px">${w.bank_name} ${w.bank_account} (${w.bank_holder})</td>
          <td><span class="badge ${w.status === 'processed' ? 'processed' : 'pending'}">${w.status === 'processed' ? '완료' : '대기중'}</span></td>
          <td>
            ${w.status === 'pending' ? `<button class="btn btn-paid btn-sm" onclick="processWithdrawal('${w.id}','${w.ref_code}',${w.amount})">지급완료</button>` : '-'}
          </td>
        </tr>`
      }
      html += '</tbody></table>'
      document.getElementById('withdrawalList').innerHTML = html
    }

    async function loadWithdrawals() {
      const { data } = await sb.from('withdrawals').select('*').order('created_at', { ascending: false })
      allWithdrawals = data || []
      renderWithdrawals()
    }

    async function loadPartners() {
      const { data } = await sb.from('partners').select('*').order('created_at', { ascending: false })
      if (!data || data.length === 0) {
        document.getElementById('partnerList').innerHTML = '<div class="empty">파트너 없음</div>'; return
      }
      let html = '<table><thead><tr><th>가입일</th><th>등급</th><th>이름</th><th>이메일</th><th>추천코드</th><th>상위총판</th><th>포인트</th><th>팀수익</th><th>액션</th></tr></thead><tbody>'
      for (const p of data) {
        const date = new Date(p.created_at).toLocaleDateString('ko-KR')
        const roleLabel = p.role === 'distributor' ? '<span style="color:#fbbf24;font-weight:700">총판</span>' : '<span style="color:#22c55e">영업</span>'
        html += `<tr>
          <td>${date}</td>
          <td>${roleLabel}</td>
          <td>${p.name}</td>
          <td style="font-size:12px">${p.email}</td>
          <td><code style="color:#22c55e">${p.ref_code}</code></td>
          <td style="font-size:12px;color:#888">${p.parent_ref_code || '-'}</td>
          <td style="color:#22c55e">${(p.points||0).toLocaleString()}원</td>
          <td style="color:#fbbf24">${(p.team_earned||0).toLocaleString()}원</td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            ${p.role === 'partner' ? `<button class="btn btn-sm" style="background:#1e1b4b;color:#818cf8;border:1px solid #312e81;font-size:11px" onclick="promoteToDistributor('${p.id}','${p.name}')">총판승급</button>` : `<button class="btn btn-sm" style="background:#1a1000;color:#fbbf24;border:1px solid #451a03;font-size:11px" onclick="demoteToPartner('${p.id}','${p.name}')">영업강등</button>`}
            <button class="btn btn-sm" style="background:#1a1a00;color:#fbbf24;border:1px solid #451a03;font-size:11px" onclick="resetPoints('${p.ref_code}','${p.name}')">포인트초기화</button>
            <button class="btn btn-danger btn-sm" style="font-size:11px" onclick="deletePartner('${p.id}','${p.ref_code}','${p.name}')">탈퇴</button>
          </td>
        </tr>`
      }
      html += '</tbody></table>'
      document.getElementById('partnerList').innerHTML = html
    }

    async function addSale() {
      const refCode = document.getElementById('saleRef').value.trim().toUpperCase()
      const customer = document.getElementById('saleCustomer').value.trim()
      const memo = document.getElementById('saleMemo').value.trim()
      const msg = document.getElementById('saleMsg')
      const showMsg = (t, type) => { msg.textContent = t; msg.className = 'msg ' + type; msg.style.display = 'block' }

      if (!refCode || !customer) return showMsg('추천코드와 고객명을 입력해주세요.', 'error')

      // 파트너 존재 확인 + 등급 확인
      const { data: partnerData } = await sb.from('partners').select('id, role, parent_ref_code').eq('ref_code', refCode).single()
      if (!partnerData) return showMsg(`추천코드 ${refCode}에 해당하는 파트너가 없습니다.`, 'error')

      // 총판 직접 판매 시 30만원, 영업 판매 시 20만원
      const isDistributor = partnerData.role === 'distributor'
      const commission = isDistributor ? 300000 : 200000

      // 판매 등록 (대기중 상태 - 확정 버튼 클릭 시 포인트 적립)
      const { error } = await sb.from('sales').insert({
        ref_code: refCode, customer_name: customer, memo,
        status: 'pending', commission: commission, amount: 1790000,
        parent_ref_code: isDistributor ? null : (partnerData.parent_ref_code || null),
        parent_commission: isDistributor ? 0 : (partnerData.parent_ref_code ? 100000 : 0)
      })
      if (error) return showMsg('오류: ' + error.message, 'error')

      const roleMsg = isDistributor ? '총판 직접판매 30만원' : '영업 20만원'
      showMsg(`✅ ${customer} 판매 등록 완료! (${roleMsg}) 확정 버튼을 눌러 포인트를 적립하세요.`, 'success')
      document.getElementById('saleRef').value = ''
      document.getElementById('saleCustomer').value = ''
      document.getElementById('saleMemo').value = ''
      await loadAll()
    }

    async function confirmSale(saleId, refCode, commission) {
      if (!confirm('이 판매를 확정하고 포인트를 적립할까요?')) return
      try {
        // 판매 정보 조회 (이미 등록 시 commission/parent 정보 포함)
        const { data: sale } = await sb.from('sales').select('*').eq('id', saleId).single()
        if (!sale) throw new Error('판매 정보를 찾을 수 없습니다')

        const { data: partner } = await sb.from('partners').select('points, total_earned, role').eq('ref_code', refCode).single()
        if (!partner) throw new Error('파트너를 찾을 수 없습니다')

        // 판매 확정
        const { error: saleError } = await sb.from('sales').update({ status: 'confirmed' }).eq('id', saleId)
        if (saleError) throw saleError

        // 파트너 포인트 적립 (sale.commission 기준 — 총판 30만 / 영업 20만)
        await sb.from('partners').update({
          points: (partner.points || 0) + sale.commission,
          total_earned: (partner.total_earned || 0) + sale.commission
        }).eq('ref_code', refCode)

        let alertMsg = ''
        if (partner.role === 'distributor') {
          alertMsg = `✅ 확정 완료!\n총판 직접판매: ${sale.commission.toLocaleString()}원 적립`
        } else if (sale.parent_ref_code) {
          // 영업 파트너 + 상위 총판 있는 경우
          const { data: parentPartner } = await sb.from('partners').select('points, total_earned, team_earned').eq('ref_code', sale.parent_ref_code).single()
          if (parentPartner) {
            await sb.from('partners').update({
              points: (parentPartner.points || 0) + sale.parent_commission,
              total_earned: (parentPartner.total_earned || 0) + sale.parent_commission,
              team_earned: (parentPartner.team_earned || 0) + sale.parent_commission
            }).eq('ref_code', sale.parent_ref_code)
          }
          alertMsg = `✅ 확정 완료!\n영업(${refCode}): ${sale.commission.toLocaleString()}원 적립\n총판(${sale.parent_ref_code}): ${sale.parent_commission.toLocaleString()}원 적립`
        } else {
          alertMsg = `✅ 확정 완료! ${sale.commission.toLocaleString()}원 적립됨`
        }

        alert(alertMsg)
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    async function processWithdrawal(withdrawalId, refCode, amount) {
      if (!confirm(`${amount.toLocaleString()}원을 실제로 계좌이체 했나요?\n확인하면 '지급완료'로 변경됩니다.`)) return
      await sb.from('withdrawals').update({ status: 'processed' }).eq('id', withdrawalId)
      const { data: partner } = await sb.from('partners').select('points').eq('ref_code', refCode).single()
      await sb.from('partners').update({ points: Math.max(0, (partner.points || 0) - amount) }).eq('ref_code', refCode)
      alert('✅ 출금 처리 완료!')
      await loadAll()
    }

    async function promoteToDistributor(partnerId, name) {
      if (!confirm(name + ' 님을 총판으로 승급할까요?\n총판은 하부 영업사원 판매 시 건당 10만원을 받습니다.')) return
      try {
        const { error } = await sb.from('partners').update({ role: 'distributor' }).eq('id', partnerId)
        if (error) throw error
        alert('✅ ' + name + ' 님 총판 승급 완료!')
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    async function demoteToPartner(partnerId, name) {
      if (!confirm(name + ' 님을 일반 영업으로 변경할까요?')) return
      try {
        const { error } = await sb.from('partners').update({ role: 'partner' }).eq('id', partnerId)
        if (error) throw error
        alert('✅ ' + name + ' 님 영업으로 변경 완료!')
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    async function resetPoints(refCode, name) {
      if (!confirm(name + ' 님의 포인트를 0으로 초기화할까요?')) return
      try {
        const { error } = await sb.from('partners').update({ points: 0 }).eq('ref_code', refCode)
        if (error) throw error
        alert('✅ ' + name + ' 님 포인트 초기화 완료!')
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    async function deletePartner(partnerId, refCode, name) {
      if (!confirm(name + ' 님을 탈퇴 처리할까요?\n관련 판매/출금 내역도 모두 삭제됩니다.')) return
      try {
        await sb.from('withdrawals').delete().eq('ref_code', refCode)
        await sb.from('sales').delete().eq('ref_code', refCode)
        await sb.from('visits').delete().eq('ref_code', refCode)
        const { error } = await sb.from('partners').delete().eq('id', partnerId)
        if (error) throw error
        alert('✅ ' + name + ' 님 탈퇴 처리 완료!')
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    async function resetAllData() {
      if (!confirm('⚠️ 모든 판매/출금/방문 데이터를 초기화할까요?\n파트너 계정은 유지됩니다.\n이 작업은 되돌릴 수 없습니다!')) return
      if (!confirm('정말로 초기화하시겠습니까? 마지막 확인입니다.')) return
      try {
        await sb.from('withdrawals').delete().neq('id', '00000000-0000-0000-0000-000000000000')
        await sb.from('sales').delete().neq('id', '00000000-0000-0000-0000-000000000000')
        await sb.from('visits').delete().neq('id', '00000000-0000-0000-0000-000000000000')
        const { data: partners } = await sb.from('partners').select('ref_code')
        for (const p of partners || []) {
          await sb.from('partners').update({ points: 0, total_earned: 0 }).eq('ref_code', p.ref_code)
        }
        alert('✅ 전체 데이터 초기화 완료!')
        await loadAll()
      } catch(err) {
        alert('오류: ' + err.message)
      }
    }

    // ── 수익 그래프 ──
    let salesChartInstance = null

    async function loadSalesChart() {
      const { data } = await sb.from('sales').select('created_at, commission').eq('status', 'confirmed')
      const monthly = {}
      for (const s of data || []) {
        const ym = s.created_at.substring(0, 7)
        monthly[ym] = (monthly[ym] || 0) + s.commission
      }
      const labels = Object.keys(monthly).sort().slice(-6)
      const values = labels.map(l => (monthly[l] || 0) / 10000)

      if (salesChartInstance) salesChartInstance.destroy()
      const ctx = document.getElementById('salesChart').getContext('2d')
      salesChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.map(l => l.replace('-', '년 ') + '월'),
          datasets: [{
            label: '확정 수수료 (만원)',
            data: values,
            backgroundColor: '#22c55e44',
            borderColor: '#22c55e',
            borderWidth: 2,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#888', font: { size: 12 } } } },
          scales: {
            x: { ticks: { color: '#555' }, grid: { color: '#1e1e1e' } },
            y: { ticks: { color: '#555', callback: v => v + '만' }, grid: { color: '#1e1e1e' } }
          }
        }
      })
    }

    // ── 공지사항 ──
    async function addNotice() {
      const title = document.getElementById('noticeTitle').value.trim()
      const content = document.getElementById('noticeContent').value.trim()
      const type = document.getElementById('noticeType').value
      if (!title || !content) return alert('제목과 내용을 입력해주세요.')

      const { error } = await sb.from('notices').insert({ title, content, type })
      if (error) return alert('오류: ' + error.message)

      document.getElementById('noticeTitle').value = ''
      document.getElementById('noticeContent').value = ''
      alert('✅ 공지사항이 등록됐습니다!')
      await loadNoticesAdmin()
    }

    async function deleteNotice(id) {
      if (!confirm('이 공지사항을 삭제할까요?')) return
      await sb.from('notices').delete().eq('id', id)
      await loadNoticesAdmin()
    }

    async function loadNoticesAdmin() {
      const { data } = await sb.from('notices').select('*').order('created_at', { ascending: false })
      if (!data || data.length === 0) {
        document.getElementById('noticeAdminList').innerHTML = '<div class="empty">등록된 공지사항이 없습니다</div>'
        return
      }
      const typeLabel = { notice: '공지', important: '중요', update: '업데이트' }
      let html = ''
      for (const n of data) {
        const date = new Date(n.created_at).toLocaleDateString('ko-KR')
        html += `<div class="notice-item">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <span class="notice-tag ${n.type}">${typeLabel[n.type] || n.type}</span>
              <span class="notice-title">${n.title}</span>
            </div>
            <button class="btn btn-danger btn-sm" style="font-size:11px" onclick="deleteNotice('${n.id}')">삭제</button>
          </div>
          <div class="notice-content">${n.content}</div>
          <div class="notice-date">${date}</div>
        </div>`
      }
      document.getElementById('noticeAdminList').innerHTML = html
    }

    // 자동 로그인 유지
    if (sessionStorage.getItem('admin_auth') === '1') {
      document.getElementById('loginScreen').style.display = 'none'
      document.getElementById('sidebarEl').style.display = 'flex'
      document.getElementById('adminPanel').style.display = 'block'
      loadAll()
    }
  </script>
</body>
</html>
