<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파트너 신청 | 센텀하이</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 480px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 26px; font-weight: 800; color: #22c55e; }
    .logo p { color: #666; margin-top: 4px; font-size: 14px; }
    .badge {
      background: linear-gradient(135deg, #052e1620, #14532d30);
      border: 1px solid #22c55e40;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 24px;
      text-align: center;
    }
    .badge .amount { font-size: 30px; font-weight: 800; color: #22c55e; }
    .badge .desc { font-size: 13px; color: #888; margin-top: 4px; }
    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 28px;
    }
    .section-title {
      font-size: 11px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 20px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e1e;
    }
    .section-title:first-child { margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #999; margin-bottom: 6px; }
    input, select {
      width: 100%;
      padding: 11px 14px;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #22c55e; }
    select option { background: #1a1a1a; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    button {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.2s;
    }
    button:hover { background: #16a34a; }
    button:disabled { background: #1e1e1e; color: #444; cursor: not-allowed; }
    .msg {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      margin-top: 14px;
      font-size: 14px;
      display: none;
    }
    .msg.error { background: #1a0505; color: #f87171; border: 1px solid #450a0a; }
    .msg.success { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .login-link { text-align: center; margin-top: 20px; color: #555; font-size: 14px; }
    .login-link a { color: #22c55e; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>센텀하이</h1>
      <p>파트너 프로그램 — 소개만 해도 수익이 생깁니다</p>
    </div>

    <div class="badge">
      <div class="amount">판매 1건당 💰 20만원</div>
      <div class="desc">월 5건 소개 = 100만원 / 랜딩페이지가 대신 설득해드립니다</div>
    </div>

    <div class="card">
      <div class="section-title">기본 정보</div>
      <div class="form-group">
        <label>이름 *</label>
        <input type="text" id="name" placeholder="홍길동" />
      </div>
      <div class="form-group">
        <label>이메일 *</label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label>비밀번호 * (8자 이상)</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>연락처 *</label>
        <input type="tel" id="phone" placeholder="010-0000-0000" />
      </div>

      <div class="section-title">정산 계좌 (수익 지급용)</div>
      <div class="form-group">
        <label>은행</label>
        <select id="bankName">
          <option value="">은행 선택</option>
          <option>KB국민은행</option><option>신한은행</option>
          <option>우리은행</option><option>하나은행</option>
          <option>IBK기업은행</option><option>NH농협은행</option>
          <option>카카오뱅크</option><option>토스뱅크</option><option>케이뱅크</option>
        </select>
      </div>
      <div class="row">
        <div class="form-group">
          <label>계좌번호</label>
          <input type="text" id="bankAccount" placeholder="'-' 없이 입력" />
        </div>
        <div class="form-group">
          <label>예금주</label>
          <input type="text" id="bankHolder" placeholder="예금주명" />
        </div>
      </div>

      <button id="submitBtn" onclick="register()">파트너 신청하기 →</button>
      <div class="msg" id="msg"></div>
    </div>

    <div class="login-link">이미 계정이 있으신가요? <a href="/partner-login.html">로그인</a></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rxlzgppwvwyduilocrmo.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_HSt_wuJZd5D415dbpDjDJw_KN_cgap_' // ← API Keys에서 복사한 Publishable key로 교체
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function generateRefCode(name) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
      let prefix = ''
      for (const ch of name) {
        if (/[a-zA-Z]/.test(ch)) prefix += ch.toUpperCase()
        if (prefix.length >= 2) break
      }
      while (prefix.length < 2) prefix += 'CH'
      let suffix = ''
      for (let i = 0; i < 4; i++) suffix += chars[Math.floor(Math.random() * chars.length)]
      return prefix + suffix
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = 'msg ' + type
      el.style.display = 'block'
      el.scrollIntoView({ behavior: 'smooth', block: 'center' })
    }

    async function register() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const phone = document.getElementById('phone').value.trim()
      const bankName = document.getElementById('bankName').value
      const bankAccount = document.getElementById('bankAccount').value.trim()
      const bankHolder = document.getElementById('bankHolder').value.trim()

      if (!name || !email || !password || !phone) return showMsg('기본 정보를 모두 입력해주세요.', 'error')
      if (password.length < 8) return showMsg('비밀번호는 8자 이상이어야 합니다.', 'error')

      const btn = document.getElementById('submitBtn')
      btn.disabled = true; btn.textContent = '신청 중...'

      try {
        const { data: authData, error: authError } = await sb.auth.signUp({ email, password })
        if (authError) throw authError

        const refCode = generateRefCode(name)
        const { error: partnerError } = await sb.from('partners').insert({
          id: authData.user.id,
          name, email, phone,
          bank_name: bankName,
          bank_account: bankAccount,
          bank_holder: bankHolder,
          ref_code: refCode,
          password_hash: 'supabase_auth'
        })
        if (partnerError) throw partnerError

        showMsg('✅ 신청 완료! 로그인 페이지로 이동합니다...', 'success')
        setTimeout(() => { window.location.href = '/partner-login.html' }, 2000)
      } catch (err) {
        const msg = err.message.includes('already registered') ? '이미 가입된 이메일입니다.' : '오류: ' + err.message
        showMsg(msg, 'error')
        btn.disabled = false; btn.textContent = '파트너 신청하기 →'
      }
    }
  </script>
</body>
</html>
