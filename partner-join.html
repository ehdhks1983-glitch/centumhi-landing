<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>파트너 신청 | 센텀하이</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --gold-dim: #c9a84c22;
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: #252525;
      --text: #e8e8e8;
      --muted: #555;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }
    .left-panel {
      width: 400px;
      min-height: 100vh;
      background: linear-gradient(170deg, #0d0c0a 0%, #100e06 60%, #080700 100%);
      border-right: 1px solid #c9a84c18;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 44px;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, #c9a84c10 0%, transparent 70%);
      pointer-events: none;
    }
    .deco-bg {
      position: absolute;
      bottom: 40px; right: -60px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px;
      color: #c9a84c06;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }
    .brand { position: relative; z-index: 1; }
    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 5px;
      background: linear-gradient(135deg, #e8c96d, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 11px;
      color: #3a3520;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .hero { position: relative; z-index: 1; }
    .hero h2 {
      font-size: 30px;
      font-weight: 900;
      line-height: 1.35;
      color: #fff;
      margin-bottom: 14px;
    }
    .hero h2 em {
      font-style: normal;
      background: linear-gradient(135deg, #e8c96d, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { font-size: 13px; color: #444; line-height: 1.9; }
    .cards { display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; }
    .card {
      background: linear-gradient(135deg, #ffffff06, #c9a84c05);
      border: 1px solid #c9a84c20;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.3s;
    }
    .card:hover { border-color: #c9a84c40; }
    .card-icon {
      width: 34px; height: 34px;
      background: #c9a84c15;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .card-label { font-size: 11px; color: #444; margin-bottom: 2px; }
    .card-amount { font-size: 17px; font-weight: 700; color: #e8c96d; }
    .sep { height: 1px; background: linear-gradient(90deg, transparent, #c9a84c20, transparent); margin: 2px 0; }
    .right-panel {
      flex: 1;
      margin-left: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
    }
    .form-wrap { width: 100%; max-width: 460px; }
    .form-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .form-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
    .sec-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 26px 0 13px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--gold-dim); }
    .fg { margin-bottom: 12px; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; font-size: 11px; color: #444; margin-bottom: 5px; letter-spacing: 0.3px; }
    input, select {
      width: 100%;
      padding: 11px 15px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--gold);
      background: var(--surface2);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    select option { background: #1a1a1a; }
    .hint { font-size: 11px; color: #2e2e2e; margin-top: 5px; }
    .sbtn {
      width: 100%;
      padding: 14px;
      margin-top: 26px;
      background: linear-gradient(135deg, #e8c96d, #c9a84c);
      color: #000;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .sbtn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, #ffffff25, transparent);
      transition: left 0.6s;
    }
    .sbtn:hover::after { left: 150%; }
    .sbtn:hover { box-shadow: 0 6px 28px #c9a84c35; transform: translateY(-1px); }
    .sbtn:disabled { background: #1e1e1e; color: #333; cursor: not-allowed; transform: none; box-shadow: none; }
    .sbtn:disabled::after { display: none; }
    .msg { padding: 12px 15px; border-radius: 8px; margin-top: 12px; font-size: 13px; display: none; }
    .msg.error { background: #130303; color: #f87171; border: 1px solid #3a0a0a; }
    .msg.success { background: #030f03; color: #4ade80; border: 1px solid #0f3a0f; }
    .login-link { text-align: center; margin-top: 22px; font-size: 13px; color: #333; }
    .login-link a { color: var(--gold); text-decoration: none; }
    .login-link a:hover { color: var(--gold-light); }
    @media (max-width: 860px) {
      .left-panel { display: none; }
      .right-panel { margin-left: 0; padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="deco-bg">₩</div>
    <div class="brand">
      <div class="brand-logo">CENTUMHI</div>
      <div class="brand-sub">Partner Program</div>
    </div>
    <div class="hero">
      <h2>소개만 해도<br><em>수익이 쌓입니다</em></h2>
      <p>자영업자에게 AI 마케팅 솔루션을 소개하세요.<br>판매가 이루어질 때마다 수익이 자동으로 적립됩니다.</p>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-icon">💼</div>
        <div>
          <div class="card-label">영업 파트너 — 판매 1건당</div>
          <div class="card-amount">200,000원</div>
        </div>
      </div>
      <div class="sep"></div>
      <div class="card">
        <div class="card-icon">👑</div>
        <div>
          <div class="card-label">총판 — 직접판매 1건당</div>
          <div class="card-amount">300,000원</div>
        </div>
      </div>
      <div class="card">
        <div class="card-icon">📈</div>
        <div>
          <div class="card-label">월 5건 소개 예상 수익</div>
          <div class="card-amount">1,000,000원+</div>
        </div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-wrap">
      <div class="form-title">파트너 신청</div>
      <div class="form-sub">정보를 입력하고 나만의 추천 링크를 받으세요</div>

      <div class="sec-label">기본 정보</div>
      <div class="fg"><label>이름 *</label><input type="text" id="name" placeholder="홍길동" /></div>
      <div class="fg"><label>이메일 *</label><input type="email" id="email" placeholder="example@email.com" /></div>
      <div class="fg"><label>비밀번호 * (8자 이상)</label><input type="password" id="password" placeholder="••••••••" /></div>
      <div class="fg"><label>연락처 *</label><input type="tel" id="phone" placeholder="010-0000-0000" /></div>
      <div class="fg">
        <label>총판 추천코드 (총판에게 소개받은 경우만)</label>
        <input type="text" id="parentRefCode" placeholder="없으면 비워두세요" style="text-transform:uppercase" />
      </div>

      <div class="sec-label">정산 계좌</div>
      <div class="fg">
        <label>은행</label>
        <select id="bankName">
          <option value="">은행 선택</option>
          <option>KB국민은행</option><option>신한은행</option><option>우리은행</option>
          <option>하나은행</option><option>IBK기업은행</option><option>NH농협은행</option>
          <option>카카오뱅크</option><option>토스뱅크</option><option>케이뱅크</option>
        </select>
      </div>
      <div class="fr">
        <div class="fg"><label>계좌번호</label><input type="text" id="bankAccount" placeholder="'-' 없이 입력" /></div>
        <div class="fg"><label>예금주</label><input type="text" id="bankHolder" placeholder="예금주명" /></div>
      </div>
      <div class="hint">수익 정산 시 위 계좌로 지급됩니다</div>

      <button class="sbtn" id="submitBtn" onclick="register()">파트너 신청하기 →</button>
      <div class="msg" id="msg"></div>
      <div class="login-link">이미 파트너이신가요? <a href="/partner-login.html">로그인</a></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://rxlzgppwvwyduilocrmo.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_HSt_wuJZd5D415dbpDjDJw_KN_cgap_'
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    function generateRefCode(name) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
      let prefix = ''
      for (const ch of name) {
        if (/[a-zA-Z]/.test(ch)) prefix += ch.toUpperCase()
        if (prefix.length >= 2) break
      }
      while (prefix.length < 2) prefix += 'CH'
      let suffix = ''
      for (let i = 0; i < 6; i++) suffix += chars[Math.floor(Math.random() * chars.length)]
      return prefix + suffix
    }

    function showMsg(text, type) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = 'msg ' + type
      el.style.display = 'block'
      el.scrollIntoView({ behavior: 'smooth', block: 'center' })
    }

    async function register() {
      const name = document.getElementById('name').value.trim()
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const phone = document.getElementById('phone').value.trim()
      const bankName = document.getElementById('bankName').value
      const bankAccount = document.getElementById('bankAccount').value.trim()
      const bankHolder = document.getElementById('bankHolder').value.trim()
      const parentRefCode = document.getElementById('parentRefCode').value.trim().toUpperCase()

      if (!name || !email || !password || !phone) return showMsg('기본 정보를 모두 입력해주세요.', 'error')
      if (password.length < 8) return showMsg('비밀번호는 8자 이상이어야 합니다.', 'error')

      if (parentRefCode) {
        const { data: parentData } = await sb.from('partners').select('role').eq('ref_code', parentRefCode).single()
        if (!parentData) return showMsg('총판 코드가 존재하지 않습니다.', 'error')
        if (parentData.role !== 'distributor') return showMsg('유효한 총판 코드가 아닙니다.', 'error')
      }

      const btn = document.getElementById('submitBtn')
      btn.disabled = true; btn.textContent = '신청 중...'

      try {
        const { data: authData, error: authError } = await sb.auth.signUp({ email, password })
        if (authError) throw authError
        if (!authData.user) throw new Error('유저 생성 실패')

        const refCode = generateRefCode(name)
        const { error: partnerError } = await sb.from('partners').insert({
          id: authData.user.id, name, email, phone,
          bank_name: bankName, bank_account: bankAccount, bank_holder: bankHolder,
          ref_code: refCode, password_hash: 'supabase_auth',
          role: 'partner', parent_ref_code: parentRefCode || null
        })
        if (partnerError) throw partnerError

        showMsg('✅ 신청 완료! 로그인 페이지로 이동합니다...', 'success')
        setTimeout(() => { window.location.href = '/partner-login.html' }, 2000)
      } catch (err) {
        const msg = err.message.includes('already registered') ? '이미 가입된 이메일입니다.' : '오류: ' + err.message
        showMsg(msg, 'error')
        btn.disabled = false; btn.textContent = '파트너 신청하기 →'
      }
    }
  </script>
</body>
</html>
